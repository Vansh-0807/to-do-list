<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Todo App</title>
    <style>
        body {
            background-color: #000000;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            background: rgba(30, 30, 30, 0.8);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #ffffff, #bb86fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 14px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: block;
        }

        /* Primary Action (Login/Dashboard) */
        .btn-primary {
            background: linear-gradient(135deg, #03dac6, #6200ee);
            color: white;
            box-shadow: 0 4px 15px rgba(3, 218, 198, 0.3);
        }

        /* Secondary Action (Signup/Logout) */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #bb86fc;
            border: 1px solid #bb86fc;
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 8px 20px rgba(187, 134, 252, 0.4);
        }

        .welcome-text {
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div class="container">
        <h1>Todo App</h1>
        
        <div class="button-group">
            {% if request.user.is_authenticated %}
                <p class="welcome-text">Logged in as <b>{{ request.user.username }}</b></p>
                <a href="/dashboard" class="btn btn-primary">Go to Dashboard</a>
                <a href="{% url 'logout' %}" class="btn btn-secondary">Logout</a>
            {% else %}
                <p class="welcome-text">Manage your tasks with style.</p>
                <a href="{% url 'login' %}" class="btn btn-primary">Login to Account</a>
                <a href="{% url 'signup' %}" class="btn btn-secondary">Create New Account</a>
            {% endif %}
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; else if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(187, 134, 252, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 80; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>
</html>
