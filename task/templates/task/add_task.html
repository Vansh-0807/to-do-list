<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task | Todo App</title>
    <style>
        /* Modern Reset & Body */
        body {
            background-color: #000000;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Upgraded Glassmorphism Container */
        .container {
            background: rgba(20, 20, 20, 0.8);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            width: 100%;
            max-width: 480px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin: 20px;
            z-index: 1;
        }

        h1 {
            color: #ffffff;
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(187, 134, 252, 0.4);
        }

        /* Form Layout */
        form p {
            display: flex;
            flex-direction: column;
            margin-bottom: 1.5rem;
        }

        label {
            color: #bb86fc;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Modern Input Styling */
        input[type="text"], 
        input[type="number"], 
        input[type="datetime-local"],
        input[type="date"],
        textarea, 
        select {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Styling the Multi-select Tags Box */
        select[multiple] {
            height: 140px;
            padding: 8px;
            border-color: rgba(3, 218, 198, 0.3); /* Match teal theme */
        }

        select[multiple] option {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 4px;
            background-color: transparent;
        }

        select[multiple] option:checked {
            background: linear-gradient(90deg, rgba(3, 218, 198, 0.2), rgba(98, 0, 238, 0.2)) !important;
            color: #03dac6;
        }

        /* Custom Scrollbar for Tags List */
        select::-webkit-scrollbar {
            width: 6px;
        }
        select::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        select::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #03dac6;
            background-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(3, 218, 198, 0.3);
        }

        /* Submit Button Upgrade */
        input[type="submit"] {
            width: 100%;
            background: linear-gradient(45deg, #03dac6, #6200ee);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 15px;
            box-shadow: 0 8px 25px rgba(98, 0, 238, 0.4);
            text-transform: uppercase;
        }

        input[type="submit"]:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 30px rgba(3, 218, 198, 0.5);
            filter: brightness(1.1);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .back-link:hover {
            color: #03dac6;
            text-shadow: 0 0 10px rgba(3, 218, 198, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div class="container">
        <h1>Add Task</h1>

        <form action="" method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" name="submit" value="Launch Task">
        </form>

        <a href="{% url 'home' %}" class="back-link">← Return to Dashboard</a>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.3 - 0.15;
                this.speedY = Math.random() * 0.3 - 0.15;
                this.opacity = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; else if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(187, 134, 252, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 80; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>
</html>
