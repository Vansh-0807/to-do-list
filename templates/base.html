<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My To Do App{% endblock %}</title>
    <style>
        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        
        /* Header Styles */
        header {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        /* Content Area */
        .content {
            padding: 30px;
        }
        
        /* Form Styles */
        .task-form {
            display: flex;
            margin-bottom: 30px;
            gap: 10px;
        }
        
        .task-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .task-input:focus {
            outline: none;
            border-color: #6a11cb;
        }
        
        .add-btn {
            padding: 15px 25px;
            background: #6a11cb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        .add-btn:hover {
            background: #2575fc;
        }
        
        /* Task List Styles */
        .task-list {
            list-style: none;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            animation: fadeIn 0.5s;
        }
        
        .task-item:last-child {
            border-bottom: none;
        }
        
        .task-text {
            flex: 1;
            font-size: 18px;
            margin-left: 15px;
        }
        
        .completed .task-text {
            text-decoration: line-through;
            color: #888;
        }
        
        /* Checkbox Styles */
        .task-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        
        /* Action Buttons */
        .task-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .complete-btn {
            background: #4CAF50;
            color: white;
        }
        
        .complete-btn:hover {
            background: #3e8e41;
        }
        
        .delete-btn {
            background: #f44336;
            color: white;
        }
        
        .delete-btn:hover {
            background: #d32f2f;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .empty-state i {
            font-size: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Responsive Design */
        @media (max-width: 600px) {
            .task-form {
                flex-direction: column;
            }
            
            .content {
                padding: 20px;
            }
            
            header h1 {
                font-size: 2rem;
            }
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>My To-Do List</h1>
            <p>Stay organized and get things done</p>
        </header>
        
        <div class="content">
            {% block content %}
            <!-- Your task list and form will go here -->
            {% endblock %}
        </div>
        
        <footer>
            <p>Built with Django • {% now "Y" %}</p>
        </footer>
    </div>
</body>
</html>
